<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研词汇</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3efe9;
  --card: #e8e1d5;
  --card-hover: #ddd4c3;
  --green: #7d8b6f;
  --green-dark: #5a6950;
  --green-light: #a3b398;
  --brown: #a0907a;
  --brown-dark: #6b5d4e;
  --brown-light: #c4b8a7;
  --text: #4a4036;
  --text-light: #8a7e6e;
  --border: #d4cbc0;
  --correct: #7d9b7a;
  --wrong: #c49a8a;
  --accent: #b8956a;
  --white: #faf8f4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 24px 60px;
}

/* Header */
.header { text-align: center; padding: 40px 0 20px; }
.header h1 { font-size: 28px; font-weight: 700; color: var(--green-dark); letter-spacing: 2px; }
.header p { color: var(--text-light); font-size: 14px; margin-top: 6px; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* --- Settings --- */
.settings-card {
  background: var(--card);
  border-radius: 16px;
  padding: 36px 32px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(74,64,54,0.06);
}
.settings-card h2 {
  font-size: 20px;
  color: var(--brown-dark);
  margin-bottom: 8px;
}
.settings-card .sub {
  color: var(--text-light);
  font-size: 14px;
  margin-bottom: 28px;
}
.count-options {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.count-btn {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  border: 2px solid var(--border);
  background: var(--white);
  cursor: pointer;
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  transition: all .2s;
}
.count-btn:hover { border-color: var(--green); color: var(--green-dark); }
.count-btn.selected {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.start-btn {
  padding: 14px 48px;
  border-radius: 12px;
  border: none;
  background: var(--green);
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all .2s;
}
.start-btn:hover { background: var(--green-dark); transform: translateY(-1px); }

/* Stats */
.stats-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-light);
}
.stat-item {
  background: var(--card);
  border-radius: 10px;
  padding: 10px 16px;
}
.stat-item strong { color: var(--green-dark); font-size: 16px; }

/* --- Progress bar --- */
.progress-wrap {
  background: var(--card);
  border-radius: 10px;
  height: 8px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 10px;
  transition: width .3s;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 8px;
}

/* --- Study Card --- */
.study-card {
  background: var(--white);
  border-radius: 20px;
  padding: 40px 32px;
  box-shadow: 0 4px 20px rgba(74,64,54,0.08);
  text-align: center;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.study-card .word-en {
  font-size: 36px;
  font-weight: 700;
  color: var(--green-dark);
  letter-spacing: 1px;
}
.study-card .phonetic {
  font-size: 15px;
  color: var(--text-light);
  margin: 6px 0 16px;
}
.study-card .meaning-main {
  font-size: 22px;
  color: var(--brown-dark);
  font-weight: 600;
  margin-bottom: 4px;
}
.study-card .pos-tag {
  display: inline-block;
  background: var(--green-light);
  color: #fff;
  font-size: 13px;
  padding: 3px 12px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.study-card .detail-section {
  text-align: left;
  margin-top: 8px;
}
.study-card .detail-label {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 14px 0 4px;
}
.study-card .example-en {
  font-size: 15px;
  color: var(--text);
  font-style: italic;
  margin-bottom: 2px;
}
.study-card .example-cn {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 6px;
}
.study-card .phrase-item, .study-card .expr-item {
  font-size: 14px;
  color: var(--text);
  padding: 3px 0;
}
.study-card .phrase-item::before { content: "▸ "; color: var(--green); }
.study-card .expr-item::before { content: "✦ "; color: var(--accent); }
.study-card .mu-item {
  font-size: 13px;
  color: var(--brown-dark);
  padding: 4px 0;
  font-style: italic;
}
.study-card .mu-item::before { content: "🎭 "; }

.card-nav {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}
.nav-btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: 2px solid var(--border);
  background: var(--white);
  cursor: pointer;
  font-size: 15px;
  color: var(--text);
  transition: all .2s;
}
.nav-btn:hover { border-color: var(--green); color: var(--green-dark); }
.nav-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
.nav-btn.primary:hover { background: var(--green-dark); }

/* --- Quiz --- */
.quiz-card {
  background: var(--white);
  border-radius: 20px;
  padding: 40px 32px;
  box-shadow: 0 4px 20px rgba(74,64,54,0.08);
  text-align: center;
}
.quiz-prompt {
  font-size: 32px;
  font-weight: 700;
  color: var(--green-dark);
  margin-bottom: 8px;
}
.quiz-hint {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 24px;
}
.quiz-input {
  width: 100%;
  max-width: 400px;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid var(--border);
  font-size: 18px;
  text-align: center;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.quiz-input:focus { border-color: var(--green); }
.quiz-input.correct { border-color: var(--correct); background: #f0f5ee; }
.quiz-input.wrong { border-color: var(--wrong); background: #faf0ed; }
.quiz-feedback {
  margin-top: 16px;
  font-size: 15px;
  min-height: 24px;
}
.quiz-feedback.correct { color: #5a7a55; }
.quiz-feedback.wrong { color: #b0654e; }
.quiz-submit {
  margin-top: 16px;
  padding: 12px 36px;
  border-radius: 10px;
  border: none;
  background: var(--green);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.quiz-submit:hover { background: var(--green-dark); }
.quiz-submit:disabled { opacity: 0.5; cursor: default; }

/* --- Results --- */
.results-card {
  background: var(--white);
  border-radius: 20px;
  padding: 40px 32px;
  box-shadow: 0 4px 20px rgba(74,64,54,0.08);
  text-align: center;
}
.results-score {
  font-size: 64px;
  font-weight: 700;
  color: var(--green-dark);
}
.results-detail {
  font-size: 15px;
  color: var(--text-light);
  margin: 8px 0 24px;
}
.review-list {
  text-align: left;
  max-width: 500px;
  margin: 0 auto;
}
.review-item {
  background: var(--bg);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 12px;
  border-left: 4px solid var(--wrong);
}
.review-item.passed { border-left-color: var(--correct); }
.review-item .rw-word { font-size: 18px; font-weight: 700; color: var(--green-dark); }
.review-item .rw-meaning { font-size: 15px; color: var(--brown-dark); margin: 4px 0; }
.review-item .rw-yours { font-size: 13px; color: var(--text-light); }
.review-item .rw-yours span { font-weight: 600; }
.review-item .rw-yours span.right { color: #5a7a55; }
.review-item .rw-yours span.wrong { color: #b0654e; }

.phase-badge {
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 20px;
  letter-spacing: 1px;
}
.phase-badge.study { background: #e8dccf; color: var(--brown-dark); }
.phase-badge.quiz-cn { background: #dce4d5; color: var(--green-dark); }
.phase-badge.quiz-en { background: #d5dce4; color: #4a6070; }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.view.active { animation: fadeIn .35s ease; }
.study-card, .quiz-card, .results-card { animation: fadeIn .3s ease; }

/* Homepage & Calendar */
.home-layout { display: flex; gap: 20px; align-items: flex-start; }
.home-left { flex: 2; min-width: 0; }
.home-right { flex: 1; min-width: 200px; position: sticky; top: 20px; }
.home-stats { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
.home-stat { background: var(--card); border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 60px; }
.home-stat .val { font-size: 18px; font-weight: 700; color: var(--green-dark); }
.home-stat .lbl { font-size: 10px; color: var(--text-light); margin-top: 1px; }
.calendar-wrap { background: var(--white); border-radius: 16px; padding: 16px; box-shadow: 0 2px 12px rgba(74,64,54,0.06); }
.cal-month-label { font-size: 13px; font-weight: 700; color: var(--brown-dark); margin: 14px 0 2px; text-align: center; }
.cal-month-label:first-child { margin-top: 0; }
.cal-estimate { font-size: 12px; color: var(--accent); text-align: center; margin-bottom: 12px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.cal-day-hdr { font-size: 9px; color: var(--text-light); padding: 2px 0; }
.cal-day { aspect-ratio: 1; border-radius: 6px; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: all .15s; color: var(--text); }
.cal-day.has-data { background: #dce4d5; cursor: pointer; font-weight: 600; color: var(--green-dark); }
.cal-day.has-data:hover { background: var(--green-light); color: #fff; }
.cal-day.today { border: 2px solid var(--accent); }
.cal-day.empty { color: #ddd; }
.cal-day .err-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--wrong); position: absolute; top: 2px; right: 2px; }

.right-panel { background: var(--white); border-radius: 16px; padding: 24px 20px; box-shadow: 0 2px 12px rgba(74,64,54,0.06); }
.right-panel h2 { font-size: 17px; color: var(--brown-dark); margin-bottom: 4px; text-align: center; }
.right-panel .sub { color: var(--text-light); font-size: 12px; margin-bottom: 16px; text-align: center; }
.right-count-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.right-count-options .count-btn { width: 100%; height: 48px; }
.right-panel .start-btn { width: 100%; }
.right-panel .reset-section { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74,64,54,0.4); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
.modal-overlay.active { display: flex; }
.modal { background: var(--white); border-radius: 20px; padding: 28px 24px; max-width: 580px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(74,64,54,0.15); animation: fadeIn .25s ease; }
.modal h3 { font-size: 18px; color: var(--brown-dark); margin-bottom: 16px; text-align: center; }
.modal-close { position: sticky; top: 0; float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-light); padding: 4px 8px; border-radius: 6px; z-index: 1; }
.modal-close:hover { background: var(--bg); }
.word-chip { display: block; width: 100%; text-align: left; padding: 12px 16px; background: var(--bg); border-radius: 10px; margin-bottom: 8px; border: none; cursor: pointer; transition: all .15s; font-family: inherit; color: var(--text); }
.word-chip:hover { background: var(--card-hover); }
.word-chip .wc-en { font-weight: 700; color: var(--green-dark); font-size: 15px; }
.word-chip .wc-cn { color: var(--brown-dark); font-size: 13px; }
.word-chip .wc-wrong { display: block; border-left: 3px solid var(--wrong); padding-left: 8px; margin-top: 4px; font-size: 12px; color: var(--wrong); }
.reset-section { text-align: center; margin-top: 8px; padding-top: 16px; border-top: 1px solid var(--border); }
.reset-btn { background: none; border: 1px solid var(--wrong); color: var(--wrong); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .2s; }
.reset-btn:hover { background: #faf0ed; }

/* Responsive */
/* Tablet / iPad (both orientations) */
@media (max-width: 900px) {
  .header { padding: 24px 0 12px; }
  .header h1 { font-size: 24px; }
  .container { padding: 20px 16px 40px; }
  .home-layout { gap: 16px; }
  .home-left { flex: 1.4; }
  .home-right { flex: 1; position: static; min-width: 170px; }
  .right-panel { padding: 20px 16px; }
  .right-panel h2 { font-size: 15px; }
  .right-count-options .count-btn { height: 40px; font-size: 14px; }
  .home-stats { gap: 6px; }
  .home-stat { padding: 8px 10px; min-width: 52px; }
  .home-stat .val { font-size: 15px; }
  .home-stat .lbl { font-size: 9px; }
  .calendar-wrap { padding: 12px; }
  .cal-month-label { font-size: 12px; margin: 10px 0 2px; }
  .cal-day { font-size: 10px; border-radius: 4px; }
  .cal-grid { gap: 1px; }
  .cal-day-hdr { font-size: 8px; }

  .modal { max-width: 90vw; padding: 20px 16px; }
}

/* Mobile */
@media (max-width: 600px) {
  .header { padding: 16px 0 8px; }
  .header h1 { font-size: 22px; }
  .header p { font-size: 12px; }
  .container { padding: 12px 12px 32px; }
  .home-layout { flex-direction: column; gap: 14px; }
  .home-left { flex: none; }
  .home-right { position: static; min-width: 0; }
  .right-panel { padding: 20px 16px; }
  .right-panel h2 { font-size: 16px; }
  .right-count-options { grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .right-count-options .count-btn { height: 44px; font-size: 15px; }
  .home-stats { gap: 5px; }
  .home-stat { padding: 8px 10px; min-width: 48px; border-radius: 8px; }
  .home-stat .val { font-size: 14px; }
  .home-stat .lbl { font-size: 9px; }
  .calendar-wrap { padding: 10px; border-radius: 12px; }
  .cal-month-label { font-size: 11px; margin: 10px 0 1px; }
  .cal-day { font-size: 9px; border-radius: 4px; }
  .cal-grid { gap: 1px; }
  .cal-day-hdr { font-size: 7px; }

  .study-card { padding: 24px 16px; }
  .study-card .word-en { font-size: 26px; }
  .quiz-prompt { font-size: 22px; }
  .count-btn { width: 48px; height: 48px; font-size: 16px; }
  .modal { max-width: 95vw; padding: 18px 14px; border-radius: 16px; }
  .modal h3 { font-size: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>考研词汇</h1>
    <p style="font-family:'Dancing Script',cursive;font-size:22px">Let the light in</p>
  </div>
  <!-- Home View -->
  <div id="view-home" class="view active">
    <div class="home-stats" id="home-stats"></div>
    <div class="home-layout">
      <div class="home-left">
        <div class="calendar-wrap" id="calendar-wrap"></div>
      </div>
      <div class="home-right">
        <div class="right-panel">
          <h2>今日背词计划</h2>
          <p class="sub">选择每天要学习的单词数量</p>
          <div class="right-count-options" id="home-count-options">
            <button class="count-btn" data-count="20">20</button>
            <button class="count-btn selected" data-count="50">50</button>
            <button class="count-btn" data-count="100">100</button>
            <button class="count-btn" data-count="200">200</button>
          </div>
          <button class="start-btn" id="btn-start-home">开始学习</button>
          <div class="reset-section">
            <button class="reset-btn" id="btn-reset">重置所有进度</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Day Detail Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Settings View -->
  <div id="view-settings" class="view">
    <div class="settings-card">
      <h2>今日背词计划</h2>
      <p class="sub">选择每天要学习的单词数量</p>
      <div class="count-options">
        <button class="count-btn" data-count="20">20</button>
        <button class="count-btn selected" data-count="50">50</button>
        <button class="count-btn" data-count="100">100</button>
        <button class="count-btn" data-count="200">200</button>
      </div>
      <button class="start-btn" id="btn-start">开始学习</button>
      <div class="stats-row" id="stats-row" style="display:none">
        <div class="stat-item">已坚持 <strong id="stat-days">0</strong> 天</div>
        <div class="stat-item">已掌握 <strong id="stat-mastered">0</strong> 词</div>
      </div>
    </div>
  </div>

  <!-- Study View -->
  <div id="view-study" class="view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="phase-badge study" style="margin-bottom:0">📖 学习模式</div>
      <button class="nav-btn" onclick="goHome()" style="font-size:12px;padding:6px 14px">← 返回首页</button>
    </div>
    <div class="progress-label"><span>学习进度</span><span id="study-progress-text">1/30</span></div>
    <div class="progress-wrap"><div class="progress-fill" id="study-progress" style="width:0%"></div></div>
    <div class="study-card" id="study-card"></div>
    <div class="card-nav">
      <button class="nav-btn" id="btn-prev-word">上一个</button>
      <button class="nav-btn" id="btn-next-word">下一个</button>
      <button class="nav-btn primary" id="btn-to-quiz-cn">去测试 →</button>
    </div>
  </div>

  <!-- Quiz EN→CN View -->
  <div id="view-quiz-cn" class="view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="phase-badge quiz-cn" style="margin-bottom:0">📝 看英文·写中文</div>
      <button class="nav-btn" onclick="goHome()" style="font-size:12px;padding:6px 14px">← 返回首页</button>
    </div>
    <div class="progress-label"><span>英→中 测试</span><span id="quiz-cn-progress-text">1/30</span></div>
    <div class="progress-wrap"><div class="progress-fill" id="quiz-cn-progress" style="width:0%"></div></div>
    <div class="quiz-card" id="quiz-cn-card"></div>
  </div>

  <!-- Quiz CN→EN View -->
  <div id="view-quiz-en" class="view">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="phase-badge quiz-en" style="margin-bottom:0">✏️ 看中文·写英文</div>
      <button class="nav-btn" onclick="goHome()" style="font-size:12px;padding:6px 14px">← 返回首页</button>
    </div>
    <div class="progress-label"><span>中→英 测试</span><span id="quiz-en-progress-text">1/30</span></div>
    <div class="progress-wrap"><div class="progress-fill" id="quiz-en-progress" style="width:0%"></div></div>
    <div class="quiz-card" id="quiz-en-card"></div>
  </div>

  <!-- Results View -->
  <div id="view-results" class="view">
    <div class="results-card" id="results-card"></div>
  </div>
</div>

<script>
// ============ WORD BANK ============

// ============ APP STATE ============
const STORAGE_KEY = 'kaoyan_vocab_state';
let state = {
  dailyCount: 50,
  todayDate: '',
  wordPool: [],
  currentStudyIdx: 0,
  phase: 'settings', // home | study | quiz-cn | quiz-en | results
  sessionActive: false, // true when study/quiz is in progress
  lastPhase: 'home', // remembers phase before going home
  quizCN: { current: 0, answers: [] },
  quizEN: { current: 0, answers: [] },
  history: {}, // { '2026-05-25': { count: 30, mastered: 22 } }
  mistakeBank: {}, // { '2026-05-25': [{w,p,pos,m,...}, ...] }
  dailyWords: {}, // { '2026-05-25': [{word objects}], ... }
  dailyAnswers: {} // { '2026-05-25': { cnAnswers: [...], enAnswers: [...] } }
};

function getToday() {
  return new Date().toISOString().slice(0, 10);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function pickDailyWords() {
  const today = getToday();
  const yesterday = getYesterday();

  // Start with yesterday's mistakes
  const yesterdayMistakes = state.mistakeBank[yesterday] || [];
  // Clean up old mistake entries (keep only last 7 days)
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);
  for (const date of Object.keys(state.mistakeBank)) {
    if (date < cutoff.toISOString().slice(0, 10)) delete state.mistakeBank[date];
  }

  // Get new words from bank, excluding yesterday's mistakes
  const mistakeWords = new Set(yesterdayMistakes.map(w => w.w));
  const available = WORD_BANK.filter(w => !mistakeWords.has(w.w));

  let seed = 0;
  for (let i = 0; i < today.length; i++) seed = ((seed << 5) - seed) + today.charCodeAt(i);
  const pool = [...available];
  for (let i = pool.length - 1; i > 0; i--) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const j = seed % (i + 1);
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  const newWords = pool.slice(0, state.dailyCount);
  // Mistakes first, then new words
  return [...yesterdayMistakes, ...newWords];
}

// ============ RENDER ============
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  state.phase = name;
}

// Settings
function renderSettings() {
  showView('settings');
  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.count) === state.dailyCount);
  });
  const statsRow = document.getElementById('stats-row');
  const days = Object.keys(state.history).length;
  const mastered = Object.values(state.history).reduce((sum, h) => sum + (h.mastered || 0), 0);
  if (days > 0) {
    statsRow.style.display = 'flex';
    document.getElementById('stat-days').textContent = days;
    document.getElementById('stat-mastered').textContent = mastered;
  }
}

// Quiz CN
function renderQuizCN() {
  // Sync index with actual answers count (robust against any edge case)
  state.quizCN.current = state.quizCN.answers.length;
  // If all questions answered, move on to EN quiz
  if (state.quizCN.current >= state.wordPool.length) { startQuizEN(); return; }
  showView('quiz-cn');
  const idx = state.quizCN.current;
  const total = state.wordPool.length;
  document.getElementById('quiz-cn-progress-text').textContent = `${idx + 1}/${total}`;
  document.getElementById('quiz-cn-progress').style.width = ((idx + 1) / total * 100) + '%';

  const w = state.wordPool[idx];
  const isLast = idx >= total - 1;
  document.getElementById('quiz-cn-card').innerHTML = `
    <div class="quiz-prompt">${w.w}</div>
    <div class="quiz-hint">${w.p} · ${w.pos}</div>
    <input type="text" class="quiz-input" id="quiz-cn-input" placeholder="输入中文意思……" autocomplete="off">
    <div class="quiz-feedback" id="quiz-cn-feedback"></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
      <button class="quiz-submit" id="quiz-cn-submit">确认</button>
      <button class="nav-btn" id="quiz-cn-skip" style="color:var(--wrong);border-color:var(--wrong)">跳过</button>
    </div>
  `;

  const input = document.getElementById('quiz-cn-input');
  const submit = document.getElementById('quiz-cn-submit');
  const skipBtn = document.getElementById('quiz-cn-skip');
  const feedback = document.getElementById('quiz-cn-feedback');
  let answered = false;

  function goNext() {
    if (isLast) { startQuizEN(); } else { renderQuizCN(); }
  }

  function handleSubmit() {
    if (answered) return;
    answered = true;
    const userAnswer = input.value.trim();
    const correct = fuzzyMatchCN(userAnswer, w.m);
    state.quizCN.answers.push({ word: w, userAnswer, correct });
    state.quizCN.current++; // Immediately advance so progress survives back-to-home
    input.classList.add(correct ? 'correct' : 'wrong');
    feedback.className = 'quiz-feedback ' + (correct ? 'correct' : 'wrong');
    feedback.textContent = correct ? '✓ 正确！按 Enter 继续' : `✗ 正确答案：${w.m} 按 Enter 继续`;
    submit.textContent = isLast ? '完成' : '下一题 →';
    submit.disabled = true;
    skipBtn.style.display = 'none';

    submit.onclick = goNext;
    submit.disabled = false;
    input.addEventListener('keydown', function advance(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.removeEventListener('keydown', advance);
        goNext();
      }
    });
    setTimeout(() => { submit.focus(); }, 50);
  }

  function handleSkip() {
    if (answered) return;
    answered = true;
    state.quizCN.answers.push({ word: w, userAnswer: '(跳过)', correct: false });
    state.quizCN.current++; // Immediately advance so progress survives back-to-home
    input.classList.add('wrong');
    feedback.className = 'quiz-feedback wrong';
    feedback.textContent = `✗ 正确答案：${w.m} 按 Enter 继续`;
    submit.textContent = isLast ? '完成' : '下一题 →';
    submit.disabled = true;
    skipBtn.style.display = 'none';

    submit.onclick = goNext;
    submit.disabled = false;
    input.addEventListener('keydown', function advance(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        input.removeEventListener('keydown', advance);
        goNext();
      }
    });
    setTimeout(() => { submit.focus(); }, 50);
  }

  submit.onclick = handleSubmit;
  skipBtn.onclick = handleSkip;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  setTimeout(() => input.focus(), 100);
}

// Results
function showResults() {
  state.sessionActive = false;
  showView('results');
  const total = state.wordPool.length;
  const cnCorrect = state.quizCN.answers.filter(a => a.correct).length;
  const enCorrect = state.quizEN.answers.filter(a => a.correct).length;
  const overall = Math.round((cnCorrect + enCorrect) / (total * 2) * 100);

  // Collect all wrong words (failed either CN or EN test)
  const wrongWordSet = new Set();
  state.quizCN.answers.filter(a => !a.correct).forEach(a => wrongWordSet.add(a.word));
  state.quizEN.answers.filter(a => !a.correct).forEach(a => wrongWordSet.add(a.word));
  const wrongWords = [...wrongWordSet];

  const allPassed = state.wordPool.filter(w =>
    state.quizCN.answers.find(a => a.word.w === w.w)?.correct &&
    state.quizEN.answers.find(a => a.word.w === w.w)?.correct
  );

  // Save mistakes to mistakeBank for next day
  const today = getToday();
  if (wrongWords.length > 0) {
    state.mistakeBank[today] = wrongWords;
  } else {
    // Clear today's mistakes if all correct
    delete state.mistakeBank[today];
  }

  // Save detailed answers for calendar review
  state.dailyAnswers[today] = {
    cnAnswers: state.quizCN.answers.map(a => ({ w: a.word.w, user: a.userAnswer, correct: a.correct })),
    enAnswers: state.quizEN.answers.map(a => ({ w: a.word.w, user: a.userAnswer, correct: a.correct }))
  };
  // Save to history
  if (!state.history[today]) state.history[today] = { count: 0, mastered: 0 };
  state.history[today].count = total;
  state.history[today].mastered = allPassed.length;
  saveState();

  // Build review HTML from wrong answers
  const cnWrongMap = new Map();
  state.quizCN.answers.filter(a => !a.correct).forEach(a => cnWrongMap.set(a.word.w, a.userAnswer));
  const enWrongMap = new Map();
  state.quizEN.answers.filter(a => !a.correct).forEach(a => enWrongMap.set(a.word.w, a.userAnswer));

  let reviewHTML = '';
  if (wrongWords.length > 0) {
    reviewHTML = '<div class="detail-label" style="text-align:left;margin-top:24px">需要复习的单词（共' + wrongWords.length + '个）</div><div class="review-list">';
    wrongWords.forEach(w => {
      const cnUser = cnWrongMap.get(w.w);
      const enUser = enWrongMap.get(w.w);
      reviewHTML += `
        <div class="review-item">
          <div class="rw-word">${w.w} <small>${w.p}</small></div>
          <div class="rw-meaning">${w.m} · ${w.pos}</div>
          ${cnUser ? `<div class="rw-yours">你的中文：<span class="wrong">${cnUser}</span> → <span class="right">${w.m}</span></div>` : ''}
          ${enUser ? `<div class="rw-yours">你的英文：<span class="wrong">${enUser}</span> → <span class="right">${w.w}</span></div>` : ''}
        </div>
      `;
    });
    reviewHTML += '</div>';
  }

  let message = '';
  if (overall >= 90) message = '太棒了！你已经基本掌握了这些单词！';
  else if (overall >= 70) message = '不错！再复习一下薄弱单词就能完全掌握。';
  else if (overall >= 50) message = '继续加油，多复习几遍效果更好。';
  else message = '别灰心，每天坚持背诵一定会有进步！';

  const hasMistakes = wrongWords.length > 0;

  document.getElementById('results-card').innerHTML = `
    <div class="results-score">${overall}%</div>
    <div class="results-detail">${message}</div>
    <div class="stats-row" style="margin-bottom:24px">
      <div class="stat-item">英→中 <strong>${cnCorrect}/${total}</strong></div>
      <div class="stat-item">中→英 <strong>${enCorrect}/${total}</strong></div>
    </div>
    ${reviewHTML}
    <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      ${hasMistakes ? '<button class="nav-btn primary" onclick="reviewMistakes()">复习错题 (' + wrongWords.length + '词)</button>' : ''}
      <button class="nav-btn" onclick="addMoreWords()">加量学习 (+${state.dailyCount}词)</button>
      <button class="nav-btn" onclick="restart()">再来一组</button>
      <button class="nav-btn" onclick="renderHome()">返回首页</button>
    </div>
  `;
}

// ============ FUZZY CN MATCHING ============
function fuzzyMatchCN(userInput, correctMeaning) {
  if (!userInput) return false;
  // Extract Chinese characters
  const correctChars = correctMeaning.replace(/[^一-龥]/g, '');
  const userChars = userInput.replace(/[^一-龥]/g, '');
  if (!userChars) return false;

  // Split correct meaning by common separators
  const segments = correctMeaning.split(/[；;,，、\s]+/).filter(Boolean);
  // Check if user input matches any segment well
  for (const seg of segments) {
    const segChars = seg.replace(/[^一-龥]/g, '');
    if (!segChars) continue;
    let matchedChars = 0;
    for (const ch of segChars) {
      if (userChars.includes(ch)) matchedChars++;
    }
    if (matchedChars / segChars.length >= 0.5) return true;
  }

  // Overall character match
  let totalMatched = 0;
  for (const ch of correctChars) {
    if (userChars.includes(ch)) totalMatched++;
  }
  return totalMatched / correctChars.length >= 0.5;
}

// ============ ACTIONS ============
function startStudy() {
  state.wordPool = pickDailyWords();
  state.currentStudyIdx = 0;
  state.quizCN = { current: 0, answers: [] };
  state.quizEN = { current: 0, answers: [] };
  state.todayDate = getToday();
  // Save the word list for this day
  state.dailyWords[state.todayDate] = [...state.wordPool];
  state.sessionActive = true;
  saveState();
  renderStudy();
}

function startQuizCN() {
  state.quizCN = { current: 0, answers: [] };
  renderQuizCN();
}

function startQuizEN() {
  state.quizEN = { current: 0, answers: [] };
  renderQuizEN();
}

function goHome() {
  state.lastPhase = state.phase; // Remember where we were before renderHome overwrites phase
  saveState(); // Persist quiz answers to localStorage
  renderHome();
}

function resumeStudy() {
  const phase = state.lastPhase || state.phase;
  if (phase === 'study') {
    renderStudy();
  } else if (phase === 'quiz-cn') {
    renderQuizCN();
  } else if (phase === 'quiz-en') {
    renderQuizEN();
  } else {
    renderStudy();
  }
}

function restart() {
  state.wordPool = pickDailyWords();
  state.currentStudyIdx = 0;
  state.quizCN = { current: 0, answers: [] };
  state.quizEN = { current: 0, answers: [] };
  state.todayDate = getToday();
  state.dailyWords[state.todayDate] = [...state.wordPool];
  saveState();
  renderStudy();
}

function reviewMistakes() {
  const today = getToday();
  const mistakes = state.mistakeBank[today] || [];
  if (mistakes.length === 0) {
    alert('没有需要复习的错题，太棒了！');
    return;
  }
  state.wordPool = mistakes;
  state.currentStudyIdx = 0;
  state.quizCN = { current: 0, answers: [] };
  state.quizEN = { current: 0, answers: [] };
  state.todayDate = today;
  state.dailyWords[today] = [...mistakes];
  // Clear today's mistakes so they won't be double-counted tomorrow
  delete state.mistakeBank[today];
  saveState();
  renderStudy();
}

function addMoreWords() {
  const today = getToday();
  // Get words already in the pool
  const usedWords = new Set(state.wordPool.map(w => w.w));
  // Also exclude today's mistake bank words (they'll be used for review)
  const mistakeWords = new Set((state.mistakeBank[today] || []).map(w => w.w));
  const allUsed = new Set([...usedWords, ...mistakeWords]);
  const available = WORD_BANK.filter(w => !allUsed.has(w.w));
  const shuffled = shuffle(available);
  const extra = shuffled.slice(0, state.dailyCount);
  state.wordPool = [...state.wordPool, ...extra];
  state.dailyWords[today] = [...state.wordPool];
  state.quizCN = { current: 0, answers: [] };
  state.quizEN = { current: 0, answers: [] };
  state.currentStudyIdx = 0;
  saveState();
  renderStudy();
}

// ============ HOME & CALENDAR ============
function renderHome() {
  showView('home');
  const today = getToday();

  // Highlight saved count
  document.querySelectorAll('#home-count-options .count-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.count) === state.dailyCount);
  });

  // Stats
  const totalDays = Object.keys(state.history).length;
  const totalMastered = Object.values(state.history).reduce((s, h) => s + (h.mastered || 0), 0);
  const totalDone = Object.values(state.history).reduce((s, h) => s + (h.count || 0), 0);

  // Estimate completion date
  const remainingWords = WORD_BANK.length - totalDone;
  const daysNeeded = Math.ceil(remainingWords / state.dailyCount);
  let completeDate = new Date();
  let added = 0;
  while (added < daysNeeded) {
    completeDate.setDate(completeDate.getDate() + 1);
    if (completeDate.getDay() !== 0 && completeDate.getDay() !== 6) added++; // skip weekends? No, count all days
  }
  // Simplify: just add days
  completeDate = new Date();
  completeDate.setDate(completeDate.getDate() + daysNeeded);
  const completeStr = `${completeDate.getFullYear()}年${completeDate.getMonth() + 1}月${completeDate.getDate()}日`;

  // Count today's mistakes
  const todayMistakes = (state.mistakeBank[today] || []).length;

  document.getElementById('home-stats').innerHTML = `
    <div class="home-stat"><div class="val">${totalDays}</div><div class="lbl">坚持天数</div></div>
    <div class="home-stat"><div class="val">${totalMastered}</div><div class="lbl">已掌握词</div></div>
    <div class="home-stat"><div class="val">${totalDone}</div><div class="lbl">已学词</div></div>
    <div class="home-stat"><div class="val">${todayMistakes}</div><div class="lbl">今日错题</div></div>
    <div class="home-stat"><div class="val">${completeStr}</div><div class="lbl">预计完成</div></div>
  `;

  // Calendar
  renderCalendar();

  // Update start button based on session state
  const startBtn = document.getElementById('btn-start-home');
  if (startBtn) {
    if (state.sessionActive) {
      startBtn.textContent = '继续学习';
      startBtn.onclick = resumeStudy;
    } else {
      startBtn.textContent = '开始学习';
      startBtn.onclick = startStudy;
    }
  }
}

function renderCalendar() {
  const today = getToday();
  const todayDate = new Date();
  const endMonth = 10; // November (0-indexed)
  const endYear = 2026;

  let html = '';

  // Months from current month to November 2026
  for (let y = 2026; y <= endYear; y++) {
    const startM = (y === 2026 && todayDate.getFullYear() === 2026) ? todayDate.getMonth() : 0;
    const endM = (y === endYear) ? endMonth : 11;
    for (let m = startM; m <= endM; m++) {
      html += renderMonth(y, m, today);
    }
  }

  document.getElementById('calendar-wrap').innerHTML = html;

  // Attach click handlers to days with data
  document.querySelectorAll('.cal-day.has-data').forEach(el => {
    el.addEventListener('click', () => openDay(el.dataset.date));
  });
}

function renderMonth(year, month, today) {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun

  let html = `<div class="cal-month-label">${year}年${months[month]}</div>`;
  html += '<div class="cal-grid">';

  // Day headers
  const headers = ['日','一','二','三','四','五','六'];
  headers.forEach(h => { html += `<div class="cal-day-hdr">${h}</div>`; });

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="cal-day empty"></div>';
  }

  // Days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const isToday = dateStr === today;
    const hasData = state.dailyWords[dateStr] && state.dailyWords[dateStr].length > 0;
    const hasMistakes = state.mistakeBank[dateStr] && state.mistakeBank[dateStr].length > 0;
    let cls = 'cal-day';
    if (hasData) cls += ' has-data';
    if (isToday) cls += ' today';
    if (!hasData && !isToday && new Date(dateStr) > new Date()) cls += ' empty';

    html += `<div class="${cls}" data-date="${dateStr}" ${!hasData ? '' : ''}>
      ${d}${hasMistakes ? '<span class="err-dot"></span>' : ''}
    </div>`;
  }

  html += '</div>';
  return html;
}

let currentDayView = '';

function openDay(dateStr) {
  currentDayView = dateStr;
  const words = state.dailyWords[dateStr] || [];
  const answers = state.dailyAnswers[dateStr] || { cnAnswers: [], enAnswers: [] };
  const hist = state.history[dateStr];

  // Build lookup maps
  const cnMap = new Map();
  (answers.cnAnswers || []).forEach(a => cnMap.set(a.w, a));
  const enMap = new Map();
  (answers.enAnswers || []).forEach(a => enMap.set(a.w, a));

  let wordsHTML = '';
  if (words.length === 0) {
    wordsHTML = '<p style="color:var(--text-light);text-align:center">该日无详细记录</p>';
  } else {
    words.forEach(w => {
      const cn = cnMap.get(w.w);
      const en = enMap.get(w.w);
      const cnOk = cn && cn.correct;
      const enOk = en && en.correct;
      const allOk = cnOk && enOk;

      wordsHTML += `
        <div style="padding:14px 16px;background:var(--bg);border-radius:12px;margin-bottom:10px;border-left:4px solid ${allOk ? 'var(--correct)' : 'var(--wrong)'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer" onclick="openWordDetail('${w.w}')">
            <strong style="font-size:17px;color:var(--green-dark)">${w.w}</strong>
            <span style="font-size:13px;color:var(--brown-dark)">${w.m} · ${w.pos}</span>
          </div>
          <div style="font-size:13px;display:flex;flex-direction:column;gap:4px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:var(--text-light);min-width:44px">英→中</span>
              ${cnOk
                ? '<span style="color:var(--correct);font-weight:600">✓ 正确</span>'
                : `<span style="color:var(--wrong)">你写：<b>${cn ? cn.user : '未答'}</b> → <span style="color:var(--correct)">${w.m}</span></span>`
              }
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:var(--text-light);min-width:44px">中→英</span>
              ${enOk
                ? '<span style="color:var(--correct);font-weight:600">✓ 正确</span>'
                : `<span style="color:var(--wrong)">你写：<b>${en ? en.user : '未答'}</b> → <span style="color:var(--correct)">${w.w}</span></span>`
              }
            </div>
          </div>
        </div>
      `;
    });
  }

  const totalQ = (answers.cnAnswers || []).length + (answers.enAnswers || []).length;
  const totalCorrect = (answers.cnAnswers || []).filter(a => a.correct).length + (answers.enAnswers || []).filter(a => a.correct).length;
  const scoreInfo = totalQ > 0 ? `正确率：${Math.round(totalCorrect / totalQ * 100)}%（${totalCorrect}/${totalQ}）` : (hist ? `掌握：${hist.mastered}/${hist.count}` : '');

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3>${dateStr}</h3>
    <p style="text-align:center;font-size:14px;color:var(--text-light);margin-bottom:12px">${scoreInfo} · 共${words.length}词</p>
    ${wordsHTML}
    <div style="text-align:center;margin-top:16px">
      <button class="nav-btn" onclick="closeModal()">关闭</button>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('active');
}

function openWordDetail(wordStr) {
  const w = WORD_BANK.find(w => w.w === wordStr);
  if (!w) return;
  const phrases = (w.ph || []).map(p => `<div class="phrase-item">${p}</div>`).join('');
  const exprs = (w.xp || []).map(x => `<div class="expr-item">${x}</div>`).join('');
  const musicals = (w.mu || []).map(m => `<div class="mu-item">${m}</div>`).join('');

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="study-card" style="box-shadow:none;padding:20px 0;min-height:auto">
      <div class="word-en">${w.w}</div>
      <div class="phonetic">${w.p} <span class="pos-tag">${w.pos}</span></div>
      <div class="meaning-main">${w.m}</div>
      <div class="detail-section">
        <div class="detail-label">例句</div>
        <div class="example-en">${w.ex}</div>
        <div class="example-cn">${w.exc}</div>
        ${phrases ? `<div class="detail-label">相关词组</div>${phrases}` : ''}
        ${exprs ? `<div class="detail-label">地道表达</div>${exprs}` : ''}
        ${musicals ? `<div class="detail-label">音乐剧引用</div>${musicals}` : ''}
      </div>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="nav-btn" onclick="openDay('${currentDayView}')">返回列表</button>
      <button class="nav-btn" onclick="closeModal()">关闭</button>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function resetAll() {
  if (!confirm('确定要清空所有学习记录并重新开始吗？此操作不可恢复。')) return;
  state.history = {};
  state.mistakeBank = {};
  state.dailyWords = {};
  state.dailyAnswers = {};
  state.wordPool = [];
  state.currentStudyIdx = 0;
  state.phase = 'home';
  state.lastPhase = 'home';
  state.sessionActive = false;
  state.quizCN = { current: 0, answers: [] };
  state.quizEN = { current: 0, answers: [] };
  saveState();
  renderHome();
}

// ============ EVENT BINDINGS ============
// Home page bindings
document.querySelectorAll('#home-count-options .count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.dailyCount = parseInt(btn.dataset.count);
    saveState();
    document.querySelectorAll('#home-count-options .count-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    renderHome();
  });
});

document.getElementById('btn-start-home').addEventListener('click', startStudy);
document.getElementById('btn-reset').addEventListener('click', resetAll);

// Settings page bindings (legacy)
document.querySelectorAll('#view-settings .count-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.dailyCount = parseInt(btn.dataset.count);
    saveState();
    document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

document.getElementById('btn-start').addEventListener('click', startStudy);

document.getElementById('btn-prev-word').addEventListener('click', () => {
  if (state.currentStudyIdx > 0) {
    state.currentStudyIdx--;
    renderStudy();
  }
});
document.getElementById('btn-next-word').addEventListener('click', () => {
  if (state.currentStudyIdx < state.wordPool.length - 1) {
    state.currentStudyIdx++;
    renderStudy();
  }
});
document.getElementById('btn-to-quiz-cn').addEventListener('click', startQuizCN);

// Keyboard navigation for study
document.addEventListener('keydown', e => {
  if (state.phase === 'study') {
    if (e.key === 'ArrowLeft' && state.currentStudyIdx > 0) {
      state.currentStudyIdx--;
      renderStudy();
    } else if (e.key === 'ArrowRight' && state.currentStudyIdx < state.wordPool.length - 1) {
      state.currentStudyIdx++;
      renderStudy();
    }
  }
});

// ============ SAVE / LOAD ============
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const saved = JSON.parse(raw);
      state.history = saved.history || {};
      state.dailyCount = saved.dailyCount || 50;
      state.mistakeBank = saved.mistakeBank || {};
      state.dailyWords = saved.dailyWords || {};
      state.dailyAnswers = saved.dailyAnswers || {};
      // Restore session progress if it was active
      state.sessionActive = saved.sessionActive || false;
      state.lastPhase = saved.lastPhase || 'home';
      state.phase = saved.phase || 'home';
      state.wordPool = saved.wordPool || [];
      state.currentStudyIdx = saved.currentStudyIdx || 0;
      state.quizCN = saved.quizCN || { current: 0, answers: [] };
      state.quizEN = saved.quizEN || { current: 0, answers: [] };
    } catch(e) {}
  }
}

// ============ INIT ============
loadState();
renderHome();
</script>
